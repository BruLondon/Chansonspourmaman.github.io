name: Expand Spotify Playlist

# Runs automatically whenever Bruno updates songs.source.json on GitHub.
# Also can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
    paths: ['public/songs.source.json']
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the updated songs.json back

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get Spotify access token
        id: token
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          RESPONSE=$(curl -s -X POST 'https://accounts.spotify.com/api/token' \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            -u "${SPOTIFY_CLIENT_ID}:${SPOTIFY_CLIENT_SECRET}" \
            -d 'grant_type=client_credentials')
          TOKEN=$(echo "$RESPONSE" | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c).on('end',()=>
              console.log(JSON.parse(d).access_token)
            )")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Expand playlists into track URLs
        run: node scripts/expand-playlists.mjs
        env:
          SPOTIFY_TOKEN: ${{ steps.token.outputs.token }}

      - name: Commit updated songs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/songs.json
          git diff --staged --quiet \
            && echo "songs.json unchanged — nothing to commit." \
            || (git commit -m "chore: auto-expand playlist tracks" && git push)
